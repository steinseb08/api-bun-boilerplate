name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DB_DRIVER: sqlite
      SQLITE_FILENAME: ":memory:"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit (fail on vulnerabilities)
        run: bun run security:audit

      - name: Typecheck
        run: bun run typecheck

      - name: Migration smoke
        run: bun run migrate:smoke

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration

      - name: E2E tests
        run: bun run test:e2e

      - name: Contract tests
        run: bun run test:contract

      - name: Coverage gate
        run: bun run test:coverage:gate
